# Local dev: Supabase (postgres + pgvector + auth + storage + realtime) is managed by the
# Supabase CLI — run `supabase start` to spin it up before starting other services.
# This file only manages ancillary services not covered by Supabase CLI.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - autofounder_ai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  autofounder_ai_redis_data: