services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autofounder_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autofounder_ai_local}
      POSTGRES_DB: ${POSTGRES_DB:-autofounder_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - autofounder_ai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autofounder_ai} -d ${POSTGRES_DB:-autofounder_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - autofounder_ai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  autofounder_ai_pg_data:
  autofounder_ai_redis_data: