name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier (check formatting)
        run: pnpm format:check

      # ESLint + typecheck for the JS/TS workspaces only. The Python backend's
      # ruff + mypy run in backend-ci.yml, so backend is excluded here to keep
      # this a Node-only job (no uv/Python toolchain needed).
      - name: ESLint (JS/TS workspaces)
        run: pnpm exec turbo lint --filter='!@autofounder-ai/backend'

      - name: Typecheck (JS/TS workspaces)
        run: pnpm exec turbo typecheck --filter='!@autofounder-ai/backend'
