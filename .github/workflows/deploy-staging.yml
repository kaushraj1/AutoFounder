name: Deploy to UAT

# Rolling deploy of the backend image to the staging (UAT) ECS service.
# Names match the Terraform-created resources (autofounder-ai-staging-*). The ECS
# service's deployment circuit breaker (AF-013) auto-rolls-back a failed deploy.
# CodeDeploy blue/green is the production enhancement (see infra/codedeploy/).

on:
  push:
    branches: [uat]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: autofounder-ai/backend
  ECS_CLUSTER: autofounder-ai-staging-cluster
  ECS_SERVICE: backend
  TASK_FAMILY: autofounder-ai-staging-backend
  CONTAINER_NAME: backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 \
            -t "$REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}" \
            -t "$REGISTRY/$ECR_REPOSITORY:staging-latest" \
            ./backend
          docker push "$REGISTRY/$ECR_REPOSITORY:sha-${{ github.sha }}"
          docker push "$REGISTRY/$ECR_REPOSITORY:staging-latest"

      - name: Render task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ${{ env.TASK_FAMILY }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}

      - name: Deploy (rolling, circuit-breaker rollback)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
