name: Deploy to Staging

on:
  push:
    branches: [uat]


jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ secrets.ECR_REGISTRY }}/autofounderai/backend:staging-${{ github.sha }} \
            ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/autofounderai/backend:staging-${{ github.sha }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster autofounderai-cluster \
            --service autofounderai-backend-staging \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster autofounderai-cluster \
            --services autofounderai-backend-staging \
            --region ${{ secrets.AWS_REGION }}

      - name: Notify success
        run: echo "Staging deployment complete - ${{ github.sha }}"