name: Terraform Validate

# Validates infrastructure code on every change under infra/terraform/.
# No AWS credentials needed: `init -backend=false` + `validate` check syntax,
# references, and provider schema without touching any cloud account or state.

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches: [dev, main]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read

jobs:
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate
