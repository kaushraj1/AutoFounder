# Supabase CLI config (AF-014). Drives the local stack (`supabase start`) and the
# link to the hosted project (`supabase link --project-ref <ref>`).
# Schema (platform + per-tenant org_* + orchestrator) and RLS/pgvector are owned by
# Alembic in backend/alembic — NOT by supabase/migrations. See README.md.
project_id = "autofounder-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "platform", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match the hosted Supabase Postgres major version (pgvector is enabled via the
# Alembic migration `CREATE EXTENSION vector`, not here).
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Set per environment via the dashboard / env, never hardcode real URLs here.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

[analytics]
enabled = false
