# Pre-commit hooks — run automatically on `git commit` once installed.
# Setup:  uv tool install pre-commit  (or pipx install pre-commit)  then  pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # Backend: Ruff lint + format (scoped to the Python app + tests)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        name: ruff (backend lint)
        args: ["--fix"]
        files: ^backend/(app|tests)/
      - id: ruff-format
        name: ruff-format (backend)
        files: ^backend/(app|tests)/

  # Frontend/config: Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|css|ya?ml)$
        exclude: ^(backend/|pnpm-lock\.yaml$)
