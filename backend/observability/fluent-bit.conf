# Fluent Bit config for the ECS FireLens (awsfirelens) sidecar (AF-023).
# FireLens injects the container stdout as input; this file parses the backend's
# structured-JSON log lines and ships them to CloudWatch Logs.
#
# Sidecar env vars (set in the ECS task definition when FireLens is adopted):
#   AWS_REGION  e.g. ap-south-1
#   LOG_GROUP   e.g. autofounder-ai-staging/backend
#
# Until FireLens is wired into the task definition, the backend already ships
# logs to CloudWatch via the awslogs driver (AF-013) — this is the richer-routing
# upgrade path.

[SERVICE]
    Flush        1
    Grace        30
    Log_Level    info

[FILTER]
    # Promote the JSON log payload to top-level fields (trace_id, organization_id,
    # run_id, agent_id, model, env, level, ...) so CloudWatch Insights can query them.
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On

[OUTPUT]
    Name              cloudwatch_logs
    Match             *
    region            ${AWS_REGION}
    log_group_name    /ecs/${LOG_GROUP}
    log_stream_prefix firelens-
    auto_create_group true
