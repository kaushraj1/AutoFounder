<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFounder AI - Idea Validator Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0d0e15 0%, #1a1c29 100%);
            --panel-bg: rgba(22, 24, 37, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 850px;
            backdrop-filter: blur(16px);
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px var(--primary-glow);
            position: relative;
            transition: all 0.3s ease;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.15;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(10, 11, 18, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            border: none;
            border-radius: 12px;
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6), 0 0 15px var(--accent-glow);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .response-section {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .response-box {
            background: rgba(10, 11, 18, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            max-height: 300px;
            color: #a7f3d0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        .pulse {
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AutoFounder AI</h1>
        <p class="subtitle">Startup Idea Intake & Validation Runner</p>
    </header>

    <div class="form-group">
        <label for="ideaInput">Your Startup Idea</label>
        <textarea id="ideaInput" placeholder="Describe your startup idea here. Must be at least 10 characters long...">A revolutionary AI-driven platform that automates startup idea validation, market research, and MVP generation.</textarea>
    </div>

    <button id="submitBtn" class="btn-submit" onclick="submitIdea()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Submit Idea</span>
    </button>

    <div class="response-section" id="responseSection">
        <div class="response-header">
            <label>API Response</label>
            <span id="statusBadge" class="status-badge status-success">201 Created</span>
        </div>
        <pre class="response-box" id="responseBox"></pre>
    </div>
</div>

<script>
    async function submitIdea() {
        const ideaInput = document.getElementById('ideaInput');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const responseSection = document.getElementById('responseSection');
        const responseBox = document.getElementById('responseBox');
        const statusBadge = document.getElementById('statusBadge');

        const ideaText = ideaInput.value.trim();

        if (ideaText.length < 10) {
            alert('Idea must be at least 10 characters long.');
            return;
        }

        // UI Loading State
        submitBtn.disabled = true;
        spinner.style.display = 'block';
        btnText.innerText = 'Validating...';
        btnText.classList.add('pulse');
        responseSection.style.display = 'none';

        try {
            const response = await fetch('http://localhost:8000/v1/ideas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: ideaText })
            });

            const data = await response.json();
            
            // UI Success State
            statusBadge.className = 'status-badge ' + (response.ok ? 'status-success' : 'status-error');
            statusBadge.innerText = `${response.status} ${response.statusText || (response.ok ? 'Created' : 'Error')}`;
            
            responseBox.innerText = JSON.stringify(data, null, 2);
            responseBox.style.color = response.ok ? '#a7f3d0' : '#fca5a5';
            responseSection.style.display = 'block';
        } catch (error) {
            // UI Network Error State
            statusBadge.className = 'status-badge status-error';
            statusBadge.innerText = 'Network Error';
            responseBox.innerText = `Failed to connect to backend at http://localhost:8000.\nError: ${error.message}\n\nPlease ensure your FastAPI server is running.`;
            responseBox.style.color = '#fca5a5';
            responseSection.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.innerText = 'Submit Idea';
            btnText.classList.remove('pulse');
        }
    }
</script>

</body>
</html>
